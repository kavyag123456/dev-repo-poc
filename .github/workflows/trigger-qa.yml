name: Trigger QA Workflow After PR Merge 
on: 
   pull_request: 
   types: 
       - closed 
       branches: 
            - main 
            
jobs: 
trigger-qa-workflow: 
if: github.event.pull_request.merged == true 
runs-on: ubuntu-latest 
steps: 
- name: Trigger QA repository workflow 
run: | 
  curl -L \ 
  -X POST \ 
  -H "Accept: application/vnd.github+json" \ 
  -H "Authorization: Bearer ${{ secrets.QA_REPO_PAT }}" \ 
  -H "X-GitHub-Api-Version: 2022-11-28" \ 
  https://api.github.com/repos/kavya123456/qa-repo-poc/actions/workflows/main.yml/dispatches \ 
  -d '{"ref":"main"}'
